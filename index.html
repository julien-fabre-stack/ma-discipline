function lighten(hex,amt){try{const h=hex.replace("#","");const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);const m=c=>Math.round(c+(255-c)*amt);const x=c=>c.toString(16).padStart(2,"0");return "#"+x(m(r))+x(m(g))+x(m(b));}catch(e){return hex;}}
function hexA(hex,a){try{const h=hex.replace("#","");const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;}catch(e){return hex;}}

const parseKey=(k)=>{const [y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d);};
const addDays=(k,n)=>{const d=parseKey(k);d.setDate(d.getDate()+n);return dateKey(d);};
function pruneOldDays(days,today){
  const cutoff=addDays(today,-400);
  const kept={}; const removed={};
  Object.keys(days||{}).forEach(k=>{if(k>=cutoff)kept[k]=days[k];else removed[k]=days[k];});
  return {kept, removed, changed:Object.keys(removed).length>0};
}
const mondayOf=(k)=>{const d=parseKey(k);d.setDate(d.getDate()-((d.getDay()+6)%7));return dateKey(d);};
const monthKey=(k)=>k.slice(0,7);
const addMonths=(mk,n)=>{const [y,m]=mk.split("-").map(Number);const d=new Date(y,m-1+n,1);return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;};
const daysInMonth=(mk)=>{const [y,m]=mk.split("-").map(Number);return new Date(y,m,0).getDate();};

const EX_IMG_BASE="exercices/";
const normEx=(s)=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim();
function exerciseImageFile(name){
  const n=normEx(name);
  if(!n)return null;
  if(n.includes("diamant"))return "pompes-diamant.png";
  if(n.includes("pompe")){
    if((n.includes("torse")||n.includes("buste"))&&n.includes("surelev"))return "pompes-torse-souleve.jpg";
    if((n.includes("jambe")||n.includes("pied"))&&n.includes("surelev"))return "pompes-jambes-surelevees.jpg";
    return "pompes-normales.png";
  }
  if(n.includes("traction")){
    if(n.includes("pronation"))return "tractions-pronation.png";
    if(n.includes("supination"))return "tractions-supination.png";
    if(n.includes("milieu")||n.includes("neutre"))return "traction-prise-milieu.png";
    return "tractions-pronation.png";
  }
  if(n.includes("burpee")){
    if(n.includes("planche"))return "burpee-pompe.jpg";
    if(n.includes("saut"))return "burpees.png";
    return "burpees.png";
  }
  if(n.includes("maker")){
    if(n.includes("complex"))return "maker-complex.png";
    if(n.includes("press"))return "maker-press.jpg";
    return "maker-complex.png";
  }
  if(n.includes("coup")){
    if(n.includes("pied"))return "coup-de-pied.png";
    if(n.includes("poing"))return "coup-de-poing.png";
  }
  if(n.includes("gainage")||n.includes("planche"))return "gainage.png";
  if(n.includes("roue")||n.includes("abdo"))return "roue-abdo.png";
  if(n.includes("battle")||n.includes("corde"))return "battle-rope.png";
  if(n.includes("jumping")||n.includes("jack"))return "jumping-jack.png";
  if(n.includes("squat")){
    if(n.includes("deep")||n.includes("profond"))return "deep-squat.png";
    return "squat.png";
  }
  if(n.includes("wall")||n.includes("chaise"))return "wall-sit.png";
  if(n.includes("mountain")||n.includes("grimpeur"))return "mountain-climbers.png";
  if(n.includes("shoulder")||n.includes("epaule"))return "shoulder-tap.png";
  if(n.includes("bear")||n.includes("ours")||n.includes("quadrup"))return "bear-crawling.png";
  return null;
}
function exerciseImageSrc(name){const f=exerciseImageFile(name);return f?EX_IMG_BASE+f:null;}
const ExerciseImg=({name,className,style})=>{
  const src=exerciseImageSrc(name);
  if(!src)return null;
  return <img src={src} alt="" className={className} style={style} onError={e=>{

    if(cur.endsWith(".png")){e.currentTarget.src=cur.replace(".png",".jpg");}

    e.currentTarget.onerror=()=>{e.currentTarget.style.display="none";};

};

function resizeImage(file,max,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));w=Math.round(w*sc);h=Math.round(h*sc);const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);cb(cv.toDataURL("image/jpeg",0.82));};img.src=r.result;};r.readAsDataURL(file);}
function ageFrom(bd){if(!bd)return null;const b=parseKey(bd),n=new Date();let a=n.getFullYear()-b.getFullYear();const m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;return a;}

/* ===== expansion séance -> étapes ===== */
function expandSession(items){
  const steps=[];
  (items||[]).forEach(it=>{
    const sets=it.sets&&it.sets>1?it.sets:1;
    for(let s=0;s<sets;s++){
      const tag=sets>1?`${s+1}/${sets}`:null;
      if(it.timed) steps.push({kind:"timed",block:it.name,name:it.name,reps:(it.dur||0)+" s",dur:it.dur||20,tag});
      else steps.push({kind:"work",block:it.name,name:it.name,reps:String(it.reps),cue:null,tag});
      if(it.rest>0) steps.push({kind:"rest",block:it.name,name:"Repos",dur:it.rest});
    }
  });
  return steps;
}

/* ===== Audio + Wake lock ===== */
function useBeep(){
  const ref=useRef(null);
  const ensure=()=>{if(!ref.current){try{ref.current=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(ref.current&&ref.current.state==="suspended")ref.current.resume();};
  const beep=(freq=880,dur=0.15)=>{try{const ac=ref.current;if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.0001,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.5,ac.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);}catch(e){}};
  return {ensure,beep};
}
function useWakeLock(active){
  const ref=useRef(null);
  useEffect(()=>{
    const req=async()=>{try{if(active&&"wakeLock"in navigator){ref.current=await navigator.wakeLock.request("screen");}}catch(e){}};
    if(active)req();
    const onVis=()=>{if(active&&document.visibilityState==="visible")req();};
    document.addEventListener("visibilitychange",onVis);
    return ()=>{document.removeEventListener("visibilitychange",onVis);try{ref.current&&ref.current.release();}catch(e){}ref.current=null;};
  },[active]);
}

const Ring=({value,max,id="g"})=>{const R=86,CIRC=2*Math.PI*R,off=CIRC*(1-(max?value/max:0));

    <defs><linearGradient id={id} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor={C.ember}/><stop offset="100%" stopColor={C.gold}/></linearGradient></defs>
    <circle cx="100" cy="100" r={R} fill="none" stroke={C.surf2} strokeWidth="10"/>
    <circle cx="100" cy="100" r={R} fill="none" stroke={`url(#${id})`} strokeWidth="10" strokeLinecap="round" strokeDasharray={CIRC} strokeDashoffset={off} style={{transition:"stroke-dashoffset 0.9s linear"}}/>
  </svg>;};

function statusOf(agenda,k){const p=(agenda.periods||[]).find(p=>p.kind==="status"&&inRange(k,p.start,p.end));return p?(agenda.statuses||[]).find(s=>s.id===p.catId):null;}
function activitiesOf(agenda,k){const ps=(agenda.periods||[]).filter(p=>p.kind==="activity"&&inRange(k,p.start,p.end));return ps.map(p=>(agenda.activities||[]).find(a=>a.id===p.catId)).filter(Boolean);}
function eventsOf(agenda,k){return (agenda.events||[]).filter(e=>e.date===k).sort((a,b)=>(a.time||"")<(b.time||"")?-1:1);}
function ratioOfDay(data,k){const habits=data.habits||DEFAULT_HABITS;const hl=habits.length||1;const ddd=data.days[k];if(!ddd||!ddd.habits||Array.isArray(ddd.habits))return 0;return Object.values(ddd.habits).filter(Boolean).length/hl;}
function cycleStatusOf(agenda,k){const p=(agenda.periods||[]).find(p=>p.kind==="cycle"&&inRange(k,p.start,p.end));return p?p.catId:null;}
function sportStatus(data,k){
  const agenda=data.agenda||{};
  const cyc=cycleStatusOf(agenda,k);
  if(cyc)return cyc; // "actif" ou "off", défini par les périodes de cycle
  const w=Math.floor(daysBetween(data.cycleStart||dateKey(),k)/7);const pos=((w%9)+9)%9;
  if(pos>=8)return"off";
  return dayType(parseKey(k))==="repos"?"off":"actif";
}


function Runner({steps,startIdx=0,onClose,onProgress,onDone,data}){
  const [idx,setIdx]=useState(startIdx);
  const [remaining,setRemaining]=useState(0);
  const [running,setRunning]=useState(true);
  const [finished,setFinished]=useState(false);
  const [startTime]=useState(()=>new Date());
  const [endTime,setEndTime]=useState(null);
  const {ensure,beep}=useBeep();
  const tickRef=useRef(null);
  const total=steps.length;
  const step=steps[idx];
  const nextStep=steps[idx+1]||null;
  const textColor=data&&data.runnerTextColor?data.runnerTextColor:"#FFFFFF";
  const finishMsg=data&&data.runnerFinishMsg?data.runnerFinishMsg:"🏆 Félicitations ! Séance terminée !";
  useWakeLock(true);
  useEffect(()=>{ensure();},[]);
  useEffect(()=>{if(onProgress)onProgress(idx);},[idx]);
  useEffect(()=>{if(!step)return;if(step.kind==="rest"||step.kind==="timed")setRemaining(step.dur);else setRemaining(0);setRunning(true);},[idx]);
  useEffect(()=>{
    clearInterval(tickRef.current);
    const t=step&&(step.kind==="rest"||step.kind==="timed");
    if(!t||!running)return;
    tickRef.current=setInterval(()=>{setRemaining(r=>{const nr=r-1;if(nr<=5&&nr>=1)beep(820,0.18);if(nr<=0){clearInterval(tickRef.current);beep(440,0.7);setTimeout(()=>advanceIdx(),100);return 0;}return nr;});},1000);
    return ()=>clearInterval(tickRef.current);
  },[idx,running]);
  const advanceIdx=()=>setIdx(i=>{const ni=Math.min(i+1,total);if(ni>=total){setFinished(true);setEndTime(new Date());}return ni;});
  const next=()=>advanceIdx();
  const prev=()=>setIdx(i=>Math.max(i-1,0));
  useEffect(()=>{if(finished&&endTime)onDone&&onDone();},[finished]);
  const imgSrc=step?exerciseImageSrc(step.name):null;
  const nextImgSrc=nextStep?exerciseImageSrc(nextStep.name):null;
  const fmtTime=(d)=>d?d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):"";
  const fmtDur=(ms)=>{const s=Math.floor(ms/1000);const m=Math.floor(s/60);const h=Math.floor(m/60);return h>0?`${h}h${String(m%60).padStart(2,"0")}min`:`${m}min${String(s%60).padStart(2,"0")}s`;};
  if(finished){
    const dur=endTime&&startTime?fmtDur(endTime-startTime):"";
    return (
      <div className="fixed inset-0 z-50 flex flex-col items-center justify-center px-6 text-center" style={{background:`linear-gradient(135deg, ${C.night} 0%, ${C.surf2} 100%)`,color:C.text}}>
        <div className="text-6xl mb-6">🏆</div>
        <div className="text-2xl font-extrabold mb-3" style={{background:dawn,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{finishMsg}</div>
        {endTime&&<div className="text-sm mb-1" style={{color:C.dim}}>Départ {fmtTime(startTime)} · Fin {fmtTime(endTime)}</div>}
        {dur&&<div className="text-lg font-bold mb-8" style={{color:C.gold}}>Durée totale : {dur}</div>}
        <button onClick={()=>{onDone&&onDone();}} className="w-full max-w-xs py-4 rounded-2xl font-bold text-lg" style={{background:dawn,color:"#1A1206",boxShadow:glowShadow()}}>Terminer</button>
      </div>
    );
  }
  if(!step)return null;
  return (
    <div className="fixed inset-0 z-50 flex flex-col" style={{background:C.night,color:C.text}}>
      {/* Image plein écran en arrière-plan pour les exercices */}
      {step.kind!=="rest"&&imgSrc&&(
        <div className="absolute inset-0 z-0">
          <img src={imgSrc} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",opacity:0.25}} onError={e=>{const cur=e.currentTarget.src;if(cur.endsWith(".png")){e.currentTarget.src=cur.replace(".png",".jpg");}else if(cur.endsWith(".jpg")){e.currentTarget.src=cur.replace(".jpg",".png");}else{e.currentTarget.style.display="none";}e.currentTarget.onerror=()=>{e.currentTarget.style.display="none";};  }}/>
          <div className="absolute inset-0" style={{background:`linear-gradient(to bottom, ${hexA(C.night,0.5)} 0%, ${hexA(C.night,0.2)} 40%, ${hexA(C.night,0.7)} 80%, ${C.night} 100%)`}}/>
        </div>
      )}
      {/* Header fixé */}
      <div className="relative z-10 flex items-center justify-between px-5 pt-5 pb-2">
        <button onClick={onClose} className="p-2 rounded-full" style={{background:hexA(C.surf,0.8)}}><Icon name="x" size={20} color={C.dim}/></button>
        <div className="text-xs tracking-widest uppercase text-center flex-1 px-2 truncate" style={{color:hexA(textColor,0.7)}}>{step.block}</div>
        <div className="text-xs tabular-nums px-2 py-1 rounded-full" style={{color:textColor,background:hexA(C.night,0.5)}}>{idx+1}/{total}</div>
      </div>
      <div className="relative z-10 mx-5 h-1 rounded-full overflow-hidden" style={{background:hexA(C.surf2,0.6)}}><div className="h-full" style={{width:`${(idx/total)*100}%`,background:dawn,transition:"width 320ms cubic-bezier(.22,1,.36,1)"}}/></div>
      {/* Contenu centré */}
      <div className="relative z-10 flex-1 flex flex-col items-center justify-center px-6 text-center">
        <div key={idx} className="fade-enter flex flex-col items-center w-full">
          {step.tag&&<div className="mb-3 px-3 py-1 rounded-full text-xs tracking-wider uppercase" style={{background:hexA(C.surf,0.7),color:C.gold}}>Série {step.tag}</div>}
          {/* Image grande taille visible centrée pour exercice (quand pas d'image fond ou en complément) */}
          {step.kind!=="rest"&&!imgSrc&&<div className="w-36 h-36 rounded-3xl mb-4" style={{background:C.surf2}}/>}
          {step.kind==="rest"?(
            <>
              <div className="relative flex items-center justify-center my-2">
                <Ring value={remaining} max={step.dur}/>
                <div className="absolute flex flex-col items-center">
                  <div className="text-6xl font-bold tabular-nums" style={{color:textColor}}>{fmt(remaining)}</div>
                  <div className="text-sm mt-1" style={{color:hexA(textColor,0.6)}}>Récupération</div>
                </div>
              </div>
              {/* Annonce exercice suivant pendant repos */}
              {nextStep&&nextStep.kind!=="rest"&&(
                <div className="flex items-center gap-3 mt-4 px-4 py-3 rounded-2xl" style={{background:hexA(C.surf,0.7)}}>

                  </div>

          ):step.kind==="timed"?(
            <div className="relative flex items-center justify-center my-2">
              <Ring value={remaining} max={step.dur}/>
              <div className="absolute flex flex-col items-center">

                <div className="text-sm mt-1 max-w-[10rem]" style={{color:hexA(textColor,0.6)}}>{step.name}</div>
              </div>
            </div>
          ):(
            <>
              <div className="text-3xl font-bold leading-tight max-w-xs" style={{color:textColor,textShadow:"0 2px 12px rgba(0,0,0,0.6)"}}>{step.name}</div>
              <div className="mt-4 text-6xl font-extrabold" style={{background:dawn,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",textShadow:"none"}}>{step.reps}</div>
            </>
          )}
          {step.kind==="work"&&<button onClick={next} className="mt-10 w-full max-w-xs py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2" style={{background:dawn,color:"#1A1206",boxShadow:glowShadow()}}><Icon name="check" size={22}/> Terminé</button>}
          {(step.kind==="rest"||step.kind==="timed")&&(
            <div className="mt-8 flex gap-3 w-full max-w-xs">
              <button onClick={()=>setRunning(r=>!r)} className="flex-1 py-3 rounded-2xl font-semibold flex items-center justify-center" style={{background:hexA(C.surf,0.8),color:textColor}}><Icon name={running?"pause":"play"} size={18}/></button>
              <button onClick={next} className="flex-1 py-3 rounded-2xl font-semibold flex items-center justify-center gap-2" style={{background:hexA(C.surf,0.8),color:C.gold}}><Icon name="skip" size={18}/> Passer</button>
            </div>
          )}
        </div>
        <button onClick={prev} className="mt-6 text-xs" style={{color:hexA(textColor,0.4)}}>← étape précédente</button>
      </div>
    </div>
  );
}

/* ===== WOD ===== */
function WodRunner({wod,onClose,onDone}){
  const [phase,setPhase]=useState("warm1");
  const [sec,setSec]=useState(wod.dur||900);
  const [run,setRun]=useState(false);
  const {ensure,beep}=useBeep();
  const tickRef=useRef(null);
  useWakeLock(true);
  useEffect(()=>{ensure();},[]);
  useEffect(()=>{clearInterval(tickRef.current);if(phase!=="amrap"||!run)return;tickRef.current=setInterval(()=>{setSec(s=>{const nr=s-1;if(nr<=5&&nr>=1)beep(820,0.09);if(nr<=0){clearInterval(tickRef.current);beep(440,0.5);setRun(false);return 0;}return nr;});},1000);return ()=>clearInterval(tickRef.current);},[phase,run]);
  return (
    <div className="fixed inset-0 z-50 flex flex-col" style={{background:C.night,color:C.text}}>
      <div className="flex items-center justify-between px-5 pt-5 pb-2">
        <button onClick={onClose} className="p-2 rounded-full" style={{background:C.surf}}><Icon name="x" size={20} color={C.dim}/></button>
        <div className="text-xs tracking-widest uppercase" style={{color:C.gold}}>{wod.name}</div><div style={{width:36}}/>
      </div>
      <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
        {(phase==="warm1"||phase==="warm2")&&(
          <><div className="mb-3 px-3 py-1 rounded-full text-xs tracking-wider uppercase" style={{background:C.surf,color:C.gold}}>Échauffement</div>
          {phase==="warm1"&&<ExerciseImg name="Burpees" className="w-32 h-32 object-contain rounded-2xl mb-2" style={{background:C.surf}}/>}
          <div className="text-3xl font-bold max-w-xs">{phase==="warm1"?"Burpees":"Remises debout"}</div>
          <div className="mt-4 text-5xl font-extrabold" style={{background:dawn,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>10</div>
          <button onClick={()=>setPhase(phase==="warm1"?"warm2":"amrap")} className="mt-10 w-full max-w-xs py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2" style={{background:dawn,color:"#1A1206",boxShadow:glowShadow()}}><Icon name="check" size={22}/> Terminé</button></>
        )}
        {phase==="amrap"&&(
          <><div className="flex items-center gap-2 mb-1" style={{color:C.gold}}><Icon name="flame" size={18}/><span className="tracking-widest uppercase text-xs">AMRAP {Math.round((wod.dur||900)/60)} min · max de tours</span></div>
          <div className="relative flex items-center justify-center my-2"><Ring value={sec} max={wod.dur||900} id="gw"/><div className="absolute text-5xl font-bold tabular-nums">{fmt(sec)}</div></div>
          <div className="w-full max-w-xs rounded-2xl p-4 mb-5 text-left" style={{background:C.surf}}>{(wod.items||[]).map((m,i)=>(<div key={i} className="flex justify-between py-1.5" style={{borderBottom:i<wod.items.length-1?`1px solid ${C.line}`:"none"}}><span>{m.name}</span><span className="font-bold" style={{color:C.gold}}>×{m.reps}</span></div>))}</div>
          <button onClick={()=>setRun(r=>!r)} className="w-full max-w-xs py-3 rounded-2xl font-bold flex items-center justify-center gap-2" style={{background:dawn,color:"#1A1206",boxShadow:glowShadow()}}><Icon name={run?"pause":"play"} size={18}/> {run?"Pause":"Lancer le chrono"}</button>
          <button onClick={onDone} className="mt-4 w-full max-w-xs py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2" style={{background:C.ok,color:"#06210F"}}><Icon name="trophy" size={20}/> WOD terminé</button></>
        )}
      </div>
    </div>
  );
}

/* ===== SÉANCE ===== */
function dayType(d=new Date()){const w=d.getDay();if([1,2,4,5].includes(w))return"train";if(w===3)return"recup";return"repos";}
function cycleLabel(s){const w=Math.floor(daysBetween(s,dateKey())/7);const pos=((w%9)+9)%9;return pos<8?`Semaine ${pos+1}/8`:"Semaine de décharge";}
function cycleLabelFor(data,k){
  const agenda=data.agenda||{};
  const cur=(agenda.periods||[]).find(p=>p.kind==="cycle"&&inRange(k,p.start,p.end));
  if(cur){
    if(cur.catId==="off")return"Semaine de décharge";
    const wk=Math.floor(daysBetween(cur.start,k)/7)+1;
    return `Semaine ${wk}`;
  }
  return cycleLabel(data.cycleStart||dateKey());
}

/* ===== NUTRITION ===== */
function macrosOf(food,qty){const k=food.unit==="g"?qty/100:qty;return {kcal:food.kcal*k,p:food.p*k,c:food.c*k,f:food.f*k};}
function NutritionTab({data,update,today,openSettings}){
  const [view,setView]=useState("journal");
  const [viewKey,setViewKey]=useState(today);
  const [openMeal,setOpenMeal]=useState(null); const [picker,setPicker]=useState(null);
  const [saveDraft,setSaveDraft]=useState(null); const [saveName,setSaveName]=useState("");
  const [showQuestionnaire,setShowQuestionnaire]=useState(false);
  const t=dayType(parseKey(viewKey)); const target=data.targets[t];
  const day=data.days[viewKey]||{}; const meals=day.meals||{petitdej:[],dej:[],diner:[],snack:[]}; const water=day.water||0;
  const allFoods=data.customFoods||[];

  const setDay=(patch)=>{const d={...(data.days||{})};d[viewKey]={...day,meals,water,...patch};update({days:d});};
  const setMeals=(m)=>setDay({meals:m});
  const addToMeal=(mk,e)=>setMeals({...meals,[mk]:[...(meals[mk]||[]),e]});
  const changeQty=(mk,i,q)=>{const arr=[...meals[mk]];if(q<=0)arr.splice(i,1);else arr[i]={...arr[i],qty:q};setMeals({...meals,[mk]:arr});};
  const addCombo=(mk,combo)=>{const valid=(combo.items||[]).filter(it=>allFoods.find(f=>f.id===it.id));if(!valid.length)return;setMeals({...meals,[mk]:[...(meals[mk]||[]),...valid.map(it=>({id:it.id,qty:it.qty}))]});};
  const saveCombo=(mk)=>{const items=(meals[mk]||[]).map(({id,qty})=>({id,qty}));if(!items.length)return;const name=(saveName||"").trim()||MEALS.find(m=>m[0]===mk)[1];update({combos:[...(data.combos||[]),{id:uid(),name,items}]});setSaveDraft(null);setSaveName("");};
  const mealTot=(mk)=>(meals[mk]||[]).reduce((a,e)=>{const f=allFoods.find(x=>x.id===e.id);if(!f)return a;const m=macrosOf(f,e.qty);return {kcal:a.kcal+m.kcal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f};},{kcal:0,p:0,c:0,f:0});
  const totals=MEALS.reduce((a,[k])=>{const m=mealTot(k);return {kcal:a.kcal+m.kcal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f};},{kcal:0,p:0,c:0,f:0});
  const vqr=v=>Math.round(v/target*100);
  return (

      </div>

      <div className="text-sm mb-4" style={{color:C.dim}}>{t==="train"?"Jour de séance":t==="recup"?"Jour de récup":"Jour de repos"} · objectif {target} kcal</div>

        {[["Lipid",totals.f],["Glu",totals.c],["Prot",totals.p],["VQR",vqr(totals.kcal),"%"],["Cal",Math.round(totals.kcal)]].map((m,i)=>(<div key={i} className="flex-1"><div className="text-xs mb-1" style={{color:C.dim}}>{m[0]}</div><div className={"font-bold tabular-nums "+(m[0]==="Cal"?"text-lg":"")} style={{color:m[0]==="Cal"?C.gold:C.text}}>{m[0]==="Cal"||m[0]==="VQR"?m[1]:m[1].toFixed(1)}{m[2]||""}</div></div>))}

      <div className="rounded-2xl p-4 mt-2" style={{background:C.surf,border:`1px solid ${C.line}`,boxShadow:cardShadow()}}>

      {picker&&<FoodPicker mealLabel={MEALS.find(m=>m[0]===picker)[1]} foods={allFoods} combos={data.combos||[]} onClose={()=>setPicker(null)} onAddCustom={(f)=>update({customFoods:[...(data.customFoods||[]),f]})} onPick={(f,q)=>{
        if(!allFoods.find(x=>x.id===f.id)){
          update({customFoods:[...(data.customFoods||[]),{id:f.id,name:f.name,unit:f.unit,kcal:f.kcal,p:f.p,c:f.c,f:f.f}]});
        }
        addToMeal(picker,{id:f.id,qty:q});setPicker(null);
      }} onPickCombo={(c)=>{addCombo(picker,c);setPicker(null);}}/>}
      </>):(
        <WeeklyReport data={data} startKey={viewKey}/>
      )}
    </div>
  );
}
function dayTotals(data,key){
  const allFoods=data.customFoods||[];
  const meals=(data.days[key]||{}).meals||{};
  const byMeal={}; let grand={kcal:0,p:0,c:0,f:0};
  MEALS.forEach(([k])=>{
    const tt=(meals[k]||[]).reduce((a,e)=>{const f=allFoods.find(x=>x.id===e.id);if(!f)return a;const m=macrosOf(f,e.qty);return {kcal:a.kcal+m.kcal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f};},{kcal:0,p:0,c:0,f:0});
    byMeal[k]=tt; grand={kcal:grand.kcal+tt.kcal,p:grand.p+tt.p,c:grand.c+tt.c,f:grand.f+tt.f};
  });
  return {byMeal,grand,logged:grand.kcal>0};
}

function ExerciseEditor({ex,onChange,onClose}){
  return (<div className="rounded-2xl p-4 mb-3" style={{background:C.surf2}}>
    <ExerciseImg name={ex.name} className="w-full h-40 object-contain rounded-xl mb-3" style={{background:C.surf}}/>

    <div className="flex items-center justify-between py-2 text-sm"><span>Séries</span><Stepper value={ex.sets} min={1} onChange={v=>onChange({sets:v})}/></div>
    <div className="flex items-center justify-between py-2 text-sm"><span>Chronométré</span><button onClick={()=>onChange({timed:!ex.timed})} className="px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:ex.timed?C.ember:C.surf,color:ex.timed?"#1A1206":C.dim}}>{ex.timed?"Oui":"Non"}</button></div>
    {ex.timed?(<div className="flex items-center justify-between py-2 text-sm"><span>Durée (s)</span><Stepper value={ex.dur} min={5} step={5} onChange={v=>onChange({dur:v})}/></div>):(<div className="flex items-center justify-between py-2 text-sm"><span>Répétitions</span><Stepper value={ex.reps} min={1} onChange={v=>onChange({reps:v})}/></div>)}

  </div>);
}
function ExerciseList({items,onChange}){
  const [edit,setEdit]=useState(null);
  const move=(i,dir)=>{const s=[...items];const j=i+dir;if(j<0||j>=s.length)return;[s[i],s[j]]=[s[j],s[i]];onChange(s);};
  const del=(i)=>{onChange(items.filter((_,j)=>j!==i));setEdit(null);};
  const add=()=>{const s=[...items,{id:uid(),name:"Nouvel exercice",reps:10,rest:60,sets:1,timed:false,dur:20}];onChange(s);setEdit(s.length-1);};
  const setEx=(i,patch)=>{const s=[...items];s[i]={...s[i],...patch};onChange(s);};
  const dup=(i)=>{const s=[...items];s.splice(i+1,0,{...s[i],id:uid()});onChange(s);setEdit(i+1);};
  if(edit!=null&&items[edit])return <ExerciseEditor ex={items[edit]} onChange={p=>setEx(edit,p)} onClose={()=>setEdit(null)}/>;
  return (<>
    <div className="text-xs mb-3" style={{color:C.dim}}>Repos = 0 → exercice enchaîné avec le suivant.</div>
    {items.map((ex,i)=>(<div key={ex.id} className="flex items-center gap-2 mb-2 px-3 py-2.5 rounded-xl" style={{background:C.surf2}}>
      <div className="flex flex-col gap-0.5"><button onClick={()=>move(i,-1)} className="p-0.5"><Icon name="up" size={14} color={C.dim}/></button><button onClick={()=>move(i,1)} className="p-0.5"><Icon name="down" size={14} color={C.dim}/></button></div>
      <div className="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 overflow-hidden" style={{background:C.surf}}>
        <ExerciseImg name={ex.name} className="w-full h-full object-cover"/>
        {!exerciseImageSrc(ex.name)&&<Icon name="dumbbell" size={16} color={C.dim}/>}
      </div>
      <button onClick={()=>setEdit(i)} className="flex-1 text-left min-w-0"><div className="text-sm truncate">{ex.name}</div><div className="text-xs" style={{color:C.dim}}>{ex.sets>1?ex.sets+"× ":""}{ex.timed?ex.dur+" s":ex.reps+" reps"} · repos {ex.rest}s</div></button>
      <button onClick={()=>setEdit(i)} className="p-1.5 rounded-lg" style={{background:C.surf}}><Icon name="edit" size={14} color={C.gold}/></button>
      <button onClick={()=>dup(i)} className="p-1.5 rounded-lg" style={{background:C.surf}}><Icon name="copy" size={14} color={C.dim}/></button>
      <button onClick={()=>del(i)} className="p-1.5 rounded-lg" style={{background:C.surf}}><Icon name="trash" size={14} color={C.dim}/></button>
    </div>))}
    <button onClick={add} className="w-full py-2.5 rounded-xl font-semibold text-sm mt-1" style={{background:C.surf2,color:C.gold}}>+ Ajouter un exercice</button>
  </>);
}
function TrainingSettings({data,update}){
  const workouts=getWorkouts(data);

  const addW=()=>{const id=uid();setWorkouts([...workouts,{id,name:"Nouveau workout",items:[]}]);setOpenId(id);};
  const delW=(wid)=>{const ws=workouts.filter(w=>w.id!==wid);const nt={...wt};Object.keys(nt).forEach(d=>{if(nt[d]===wid)delete nt[d];});update({workouts:ws,weekTemplate:nt});};
  const WD=[["Lun",1],["Mar",2],["Mer",3],["Jeu",4],["Ven",5],["Sam",6],["Dim",0]];
  const setDayW=(wd,wid)=>{const nt={...wt};if(wid)nt[wd]=wid;else delete nt[wd];update({weekTemplate:nt});};
  return (<>
    <div className="text-xs tracking-widest uppercase mb-1" style={{color:C.dim}}>Workouts</div>
    <div className="text-xs mb-3" style={{color:C.dim}}>Touche un workout pour déplier et modifier son contenu.</div>
    {workouts.map(w=>{const open=openId===w.id;return (
      <div key={w.id} className="rounded-2xl mb-3 overflow-hidden" style={{background:C.surf,border:`1px solid ${C.line}`,boxShadow:cardShadow()}}>
        <div className="flex items-center px-3 py-2.5 gap-2">
          <button onClick={()=>setOpenId(open?null:w.id)} className="flex items-center gap-2 flex-1 min-w-0 text-left">
            <Icon name="down" size={14} color={C.dim} style={{transition:"transform 320ms cubic-bezier(.22,1,.36,1)",transform:open?"rotate(180deg)":"rotate(0deg)"}}/>
            <span className="min-w-0"><span className="text-sm font-semibold block truncate">{w.name}</span><span className="text-xs block" style={{color:C.dim}}>{(w.items||[]).length} exercices</span></span>
          </button>
          {workouts.length>1&&<button onClick={()=>delW(w.id)} className="p-1.5 rounded-lg flex-shrink-0" style={{background:C.surf2}}><Icon name="trash" size={14} color={C.dim}/></button>}
        </div>
        <div style={{display:"grid",gridTemplateRows:open?"1fr":"0fr",transition:"grid-template-rows 320ms cubic-bezier(.22,1,.36,1)"}}>
          <div style={{minHeight:0,overflow:"hidden",opacity:open?1:0,transition:`opacity 220ms ease ${open?"60ms":"0ms"}`}}>
            <div className="px-3 pb-3" style={{borderTop:`1px solid ${C.line}`}}>
              <div className="text-xs tracking-widest uppercase mt-3 mb-1" style={{color:C.dim}}>Nom</div>
              <input value={w.name} onChange={e=>rename(w.id,e.target.value)} className="w-full px-3 py-2.5 rounded-xl mb-3 outline-none text-sm" style={{background:C.surf2,color:C.text}}/>
              <ExerciseList items={w.items||[]} onChange={items=>setItems(w.id,items)}/>
            </div>
          </div>
        </div>
      </div>
    );})}
    <button onClick={addW} className="w-full py-2.5 rounded-xl font-semibold text-sm mb-6" style={{background:C.surf2,color:C.gold}}>+ Ajouter un workout</button>
    <WodSettings data={data} update={update}/>
    <div style={{height:24}}/>
    <div className="text-xs tracking-widest uppercase mb-1" style={{color:C.dim}}>Semaine type</div>
    <div className="text-xs mb-3" style={{color:C.dim}}>Quel workout appliquer chaque jour (sinon repos).</div>
    <div className="rounded-2xl overflow-hidden" style={{border:`1px solid ${C.line}`}}>
      {WD.map(([lbl,wd],i)=>(<div key={wd} className="flex items-center gap-2 px-3 py-2" style={{background:i%2?C.surf:C.night}}>
        <span className="text-sm w-10 flex-shrink-0">{lbl}</span>
        <select value={wt[wd]||""} onChange={e=>setDayW(wd,e.target.value)} className="flex-1 px-3 py-2 rounded-xl outline-none text-sm" style={{background:C.surf2,color:C.text,border:`1px solid ${C.line}`}}>
          <option value="">Repos</option>
          {workouts.map(w=>(<option key={w.id} value={w.id}>{w.name}</option>))}
        </select>
      </div>))}
    </div>
  </>);

function WodSettings({data,update}){
  const [wodOpen,setWodOpen]=useState(null);
  const [imp,setImp]=useState(null);
  const parseWod=(txt)=>{const lines=txt.split("\n").map(l=>l.trim()).filter(Boolean);if(!lines.length)return null;const head=lines[0].split("|");const name=(head[0]||"WOD").trim();const dur=(parseInt(head[1])||15)*60;const items=lines.slice(1).map(l=>{const m=l.match(/^(.*?)[\s:·-]+(\d+)\s*$/);return m?{name:m[1].trim(),reps:+m[2]}:{name:l,reps:10};}).filter(x=>x.name);return {id:uid(),name,dur,items};};
  return (<>
    <div className="text-xs tracking-widest uppercase mb-1" style={{color:C.dim}}>WOD</div>
    <div className="text-xs mb-3" style={{color:C.dim}}>L'échauffement (10 burpees + 10 remises debout) est ajouté automatiquement. Touche un WOD pour le modifier.</div>
    {(data.wods||[]).map((w,i)=>{const open=wodOpen===w.id;return (
      <div key={w.id} className="rounded-2xl mb-3 overflow-hidden" style={{background:C.surf,border:`1px solid ${C.line}`,boxShadow:cardShadow()}}>
        <div className="flex items-center px-3 py-2.5 gap-2">
          <button onClick={()=>setWodOpen(open?null:w.id)} className="flex items-center gap-2 flex-1 min-w-0 text-left"><Icon name="down" size={14} color={C.dim} style={{transition:"transform 320ms cubic-bezier(.22,1,.36,1)",transform:open?"rotate(180deg)":"rotate(0deg)"}}/><span className="min-w-0"><span className="text-sm font-semibold block truncate">{w.name}</span><span className="text-xs block" style={{color:C.dim}}>{Math.round(w.dur/60)} min · {(w.items||[]).length} exos</span></span></button>
          <button onClick={()=>{update({wods:data.wods.filter((_,j)=>j!==i)});if(open)setWodOpen(null);}} className="p-1.5 rounded-lg flex-shrink-0" style={{background:C.surf2}}><Icon name="trash" size={14} color={C.dim}/></button>
        </div>
        <div style={{display:"grid",gridTemplateRows:open?"1fr":"0fr",transition:"grid-template-rows 320ms cubic-bezier(.22,1,.36,1)"}}>
          <div style={{minHeight:0,overflow:"hidden",opacity:open?1:0,transition:`opacity 220ms ease ${open?"60ms":"0ms"}`}}>
            <div className="px-3 pb-3 pt-3" style={{borderTop:`1px solid ${C.line}`}}>
              <WodEditor wod={w} onSave={(nw)=>{const a=[...data.wods];a[i]=nw;update({wods:a});setWodOpen(null);}} onCancel={()=>setWodOpen(null)}/>
            </div>
          </div>
        </div>
      </div>
    );})}
    <button onClick={()=>{const id=uid();update({wods:[...(data.wods||[]),{id,name:"Nouveau WOD",dur:900,items:[]}]});setWodOpen(id);}} className="w-full py-2.5 rounded-xl font-semibold text-sm mt-1" style={{background:C.surf2,color:C.gold}}>+ Ajouter un WOD</button>
    {imp==null?(
      <button onClick={()=>setImp("")} className="w-full py-2.5 rounded-xl font-semibold text-sm mt-2" style={{background:C.surf2,color:C.dim}}>⤓ Importer un WOD (coller)</button>
    ):(
      <div className="rounded-2xl p-4 mt-2" style={{background:C.surf}}>
        <div className="text-xs mb-2" style={{color:C.dim}}>Colle le texte du WOD. 1ʳᵉ ligne : <span style={{color:C.gold}}>Nom | minutes</span>, puis un exercice par ligne avec le nombre de reps à la fin.</div>
        <textarea value={imp} onChange={e=>setImp(e.target.value)} rows={6} placeholder={"Murph allégé | 20\nPompes 15\nAir squats 20\nTractions 5"} className="w-full px-3 py-2.5 rounded-xl outline-none text-sm" style={{background:C.surf2,color:C.text,fontFamily:"monospace"}}/>
        <div className="flex gap-2 mt-2"><button onClick={()=>setImp(null)} className="flex-1 py-2.5 rounded-xl font-semibold text-sm" style={{background:C.surf2,color:C.dim}}>Annuler</button><button onClick={()=>{const w=parseWod(imp);if(w&&w.items.length){update({wods:[...(data.wods||[]),w]});setImp(null);}}} className="flex-[2] py-2.5 rounded-xl font-semibold text-sm" style={{background:dawn,color:"#1A1206",boxShadow:glowShadow()}}>Importer</button></div>
      </div>
    )}
  </>);
}

function NutritionSettings({data,update}){
  const [openC,setOpenC]=useState(false);

  const customFoods=data.customFoods||[];
  const updateFood=(id,patch)=>update({customFoods:customFoods.map(f=>f.id===id?{...f,...patch}:f)});
  const deleteFood=(id)=>update({customFoods:customFoods.filter(f=>f.id!==id)});

      <div className="text-xs mb-2" style={{color:C.dim}}>Aliments ajoutés depuis la recherche CIQUAL lors de leur premier usage dans un repas.</div>
      {importedFoods.length===0&&<div className="text-sm mb-2" style={{color:C.dim}}>Aucun aliment CIQUAL utilisé pour l'instant.</div>}
      {importedFoods.map(f=>(<FoodEditRow key={f.id} food={f} onChange={p=>updateFood(f.id,p)} onDelete={()=>deleteFood(f.id)}/>))}
    </Collapsible>

      {combos.map(c=>{
        const tot=c.items.reduce((a,it)=>{const f=allFoods.find(x=>x.id===it.id);if(!f)return a;return a+macrosOf(f,it.qty).kcal;},0);
        const validCount=c.items.filter(it=>allFoods.find(x=>x.id===it.id)).length;

  const agenda=data.agenda||{statuses:DEFAULT_STATUSES,activities:DEFAULT_ACTIVITIES,rdvTypes:DEFAULT_RDV_TYPES,periods:[],events:[]};
  const statuses=agenda.statuses||[]; const activities=agenda.activities||[]; const rdvTypes=agenda.rdvTypes||[]; const periods=agenda.periods||[];
  const [adding,setAdding]=useState(null); // kind en cours d'ajout
  const [open,setOpen]=useState({statuts:false,activites:false,rdv:false,cycle:false,periodes:false});
  const toggle=(k)=>setOpen(o=>({...o,[k]:!o[k]}));
  const allCats=[...statuses.map(s=>({...s,kind:"status"})),...activities.map(a=>({...a,kind:"activity"})),...CYCLE_CATS.map(c=>({...c,kind:"cycle"}))];
  const pruneOrphans=(ag)=>{const sids=new Set((ag.statuses||[]).map(c=>c.id));const aids=new Set((ag.activities||[]).map(c=>c.id));const cids=new Set(CYCLE_CATS.map(c=>c.id));const ps=(ag.periods||[]).filter(p=>p.kind==="status"?sids.has(p.catId):p.kind==="activity"?aids.has(p.catId):p.kind==="cycle"?cids.has(p.catId):true);return {...ag,periods:ps};};
  useEffect(()=>{const cleaned=pruneOrphans(agenda);if((cleaned.periods||[]).length!==periods.length)update({agenda:cleaned});},[]);
  const setCats=(patch)=>update({agenda:pruneOrphans({...agenda,...patch})});
  const setPeriods=(ps)=>update({agenda:{...agenda,periods:ps}});
  const upsertPeriod=(np)=>{
    let ps=periods.filter(x=>x.id!==np.id);
    if(np.kind==="status"){
      ps=ps.filter(p=>!(p.kind==="status"&&(inRange(p.start,np.start,np.end)||inRange(p.end,np.start,np.end)||(p.start<=np.start&&p.end>=np.end))));
    }
    ps.push(np);
    setPeriods(ps);
  };
  const sorted=[...periods].sort((a,b)=>a.start<b.start?-1:1);
  return (<>
    <Collapsible title="Statuts" badge={statuses.length} open={open.statuts} onToggle={()=>toggle("statuts")}>
      <CatList title="Exclusifs · fond coloré" hint="Un seul par jour : mission, repos, permission…" cats={statuses} onChange={(s)=>setCats({statuses:s})}/>
    </Collapsible>
    <Collapsible title="Périodes (catégories)" badge={activities.length} open={open.activites} onToggle={()=>toggle("activites")}>
      <CatList title="Cumulables · liserés verticaux" hint="Plusieurs possibles le même jour : Ophélia, Croix-Rouge, SST…" cats={activities} onChange={(a)=>setCats({activities:a})}/>
    </Collapsible>
    <Collapsible title="Catégories RDV" badge={rdvTypes.length} open={open.rdv} onToggle={()=>toggle("rdv")}>
      <CatList title="Couleur + libellé" hint="Pour classer tes rendez-vous. Touche une catégorie dans la légende du Suivi pour aller au prochain RDV correspondant." cats={rdvTypes} onChange={(r)=>setCats({rdvTypes:r})}/>
    </Collapsible>
    <Collapsible title="Cycle d'entraînement" open={open.cycle} onToggle={()=>toggle("cycle")}>
      <div className="text-xs mb-3" style={{color:C.dim}}>Périodes Actif / Off : déterminent le n° de semaine dans Séance et le liseré Cycle (vert / gris) du tableau de bord.</div>
    </Collapsible>
    <Collapsible title="Périodes planifiées" badge={periods.length||null} open={open.periodes} onToggle={()=>toggle("periodes")}>
      {sorted.length===0&&<div className="text-sm mb-2" style={{color:C.dim}}>Aucune période pour l'instant.</div>}
      {sorted.map(p=>(<PeriodRow key={p.id} period={p} cats={allCats.filter(c=>c.kind===p.kind)} onSave={upsertPeriod} onDelete={()=>setPeriods(periods.filter(x=>x.id!==p.id))}/>))}
      {adding?(
        <PeriodEditor cats={allCats.filter(c=>c.kind===adding)} kind={adding} onSave={(p)=>{upsertPeriod(p);setAdding(null);}} onCancel={()=>setAdding(null)}/>
      ):(
        <div className="flex gap-2 mt-1">
          <button disabled={!statuses.length} onClick={()=>setAdding("status")} className="flex-1 py-2.5 rounded-xl font-semibold text-sm" style={{background:C.surf2,color:statuses.length?C.gold:C.dim}}>+ Statut</button>
          <button disabled={!activities.length} onClick={()=>setAdding("activity")} className="flex-1 py-2.5 rounded-xl font-semibold text-sm" style={{background:C.surf2,color:activities.length?C.gold:C.dim}}>+ Période</button>
          <button onClick={()=>setAdding("cycle")} className="flex-1 py-2.5 rounded-xl font-semibold text-sm" style={{background:C.surf2,color:C.gold}}>+ Cycle</button>
        </div>
      )}
    </Collapsible>
  </>);
}
function WodEditor({wod,onSave,onCancel}){
  const [w,setW]=useState({...wod,items:[...(wod.items||[])]});
  const setItem=(i,patch)=>{const it=[...w.items];it[i]={...it[i],...patch};setW({...w,items:it});};
  return (<div className="rounded-2xl p-4" style={{background:C.surf}}>
    <input value={w.name} onChange={e=>setW({...w,name:e.target.value})} className="w-full px-3 py-2.5 rounded-xl mb-3 outline-none text-sm" style={{background:C.surf2,color:C.text}}/>
    <div className="flex items-center justify-between py-2 text-sm mb-2"><span>Durée (min)</span><Stepper value={Math.round(w.dur/60)} min={1} onChange={v=>setW({...w,dur:v*60})}/></div>
    <div className="text-xs mb-2" style={{color:C.dim}}>Exercices :</div>
    {w.items.map((it,i)=>(<div key={i} className="flex items-center gap-2 mb-2"><input value={it.name} onChange={e=>setItem(i,{name:e.target.value})} placeholder="Exercice" className="flex-1 px-3 py-2 rounded-lg outline-none text-sm" style={{background:C.surf2,color:C.text}}/><Stepper value={it.reps} min={1} onChange={v=>setItem(i,{reps:v})}/><button onClick={()=>setW({...w,items:w.items.filter((_,j)=>j!==i)})} className="p-1.5 rounded-lg" style={{background:C.surf2}}><Icon name="trash" size={14} color={C.dim}/></button></div>))}
    <button onClick={()=>setW({...w,items:[...w.items,{name:"",reps:10}]})} className="w-full py-2 rounded-lg text-sm font-semibold mb-3" style={{background:C.surf2,color:C.gold}}>+ Exercice</button>
    <div className="flex gap-2"><button onClick={onCancel} className="flex-1 py-2.5 rounded-xl font-semibold text-sm" style={{background:C.surf2,color:C.dim}}>Annuler</button><button onClick={()=>onSave(w)} className="flex-[2] py-2.5 rounded-xl font-semibold text-sm" style={{background:dawn,color:"#1A1206",boxShadow:glowShadow()}}>Enregistrer</button></div>
  </div>);
}

/* ===== LOGIN ===== */
function Login(){
  const [mode,setMode]=useState("login");const [email,setEmail]=useState("");const [pw,setPw]=useState("");const [err,setErr]=useState("");const [info,setInfo]=useState("");
  const go=async()=>{setErr("");setInfo("");try{if(mode==="login")await auth.signInWithEmailAndPassword(email,pw);else await auth.createUserWithEmailAndPassword(email,pw);}catch(e){setErr(e.message.replace("Firebase:","").trim());}};
  const reset=async()=>{setErr("");setInfo("");if(!email.trim()){setErr("Saisis ton email ci-dessus, puis touche « Mot de passe oublié »");return;}try{await auth.sendPasswordResetEmail(email.trim());setInfo("Email de réinitialisation envoyé si ce compte existe.");}catch(e){setErr(e.message.replace("Firebase:","").trim());}};
  return (<div className="min-h-screen flex flex-col items-center justify-center px-6" style={{background:C.night,color:C.text}}>
    <div className="text-4xl font-extrabold mb-1" style={{background:dawn,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Ma Discipline</div>
    <div className="text-sm mb-8" style={{color:C.dim}}>{mode==="login"?"Connecte-toi":"Crée ton compte (une seule fois)"}</div>
    <div className="w-full max-w-xs">
      <input placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full px-4 py-3 rounded-xl mb-3 outline-none" style={{background:C.surf,color:C.text,border:`1px solid ${C.line}`}}/>
      <input placeholder="Mot de passe" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} className="w-full px-4 py-3 rounded-xl mb-3 outline-none" style={{background:C.surf,color:C.text,border:`1px solid ${C.line}`}}/>
      {err&&<div className="text-xs mb-3" style={{color:C.ember}}>{err}</div>}
      {info&&<div className="text-xs mb-3" style={{color:C.ok}}>{info}</div>}
      <button onClick={go} className="w-full py-3.5 rounded-2xl font-bold mb-3" style={{background:dawn,color:"#1A1206",boxShadow:glowShadow()}}>{mode==="login"?"Se connecter":"Créer le compte"}</button>
      <button onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("");setInfo("");}} className="w-full text-sm mb-2" style={{color:C.dim}}>{mode==="login"?"Première fois ? Créer un compte":"J'ai déjà un compte"}</button>
      {mode==="login"&&<button onClick={reset} className="w-full text-sm" style={{color:C.gold}}>Mot de passe oublié ?</button>}
    </div>
  </div>);
}

/* ===== APP ===== */
function App(){
  const [user,setUser]=useState(null);const [authReady,setAuthReady]=useState(false);const [data,setData]=useState(null);
  const [tab,setTab]=useState("seance");const [runner,setRunner]=useState(null);const [wod,setWod]=useState(null);const [settings,setSettings]=useState(false);
  const [online,setOnline]=useState(typeof navigator==="undefined"||navigator.onLine);
  const [pendingWrites,setPendingWrites]=useState(false);
  const today=dateKey();const saveTimer=useRef(null);const docRef=useRef(null);
  useEffect(()=>{
    const on=()=>setOnline(true), off=()=>setOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return ()=>{window.removeEventListener("online",on); window.removeEventListener("offline",off);};
  },[]);
  useEffect(()=>{if(!fbReady){setAuthReady(true);return;}return auth.onAuthStateChanged(u=>{setUser(u);setAuthReady(true);});},[]);
  useEffect(()=>{if(!user){setData(null);return;}docRef.current=dbf.doc("users/"+user.uid+"/app/data");const unsub=docRef.current.onSnapshot(snap=>{
    setPendingWrites(snap.metadata.hasPendingWrites);
    const raw=snap.exists?migrateData({...DEFAULT_DATA,...snap.data()}):migrateData({...DEFAULT_DATA});
    if(!snap.exists)docRef.current.set(DEFAULT_DATA);
    const {kept,removed,changed}=pruneOldDays(raw.days,today);
    if(changed){
      const next={...raw,days:kept};
      setData(next);
      const byMonth={};
      Object.keys(removed).forEach(k=>{const m=k.slice(0,7);(byMonth[m]=byMonth[m]||{})[k]=removed[k];});
      Object.entries(byMonth).forEach(([m,obj])=>{
        dbf.doc("users/"+user.uid+"/archive/"+m).set(obj,{merge:true}).catch(e=>console.warn("Archivage",m,e));
      });
      clearTimeout(saveTimer.current);
      saveTimer.current=setTimeout(()=>docRef.current.set(next,{merge:true}),400);
    }else{
      setData(raw);
    }
  });return unsub;},[user]);
  const update=(patch)=>{setData(prev=>{const next={...prev,...patch};if(docRef.current){clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>docRef.current.set(next,{merge:true}),400);}return next;});};
  const markSport=()=>{const day=data.days[today]||{};const h={...((day.habits&&!Array.isArray(day.habits))?day.habits:{}),sport:true};const d={...data.days};d[today]={...day,habits:h};update({days:d});};
  const todayWorkout=data?workoutForDay(data,today):null;
  const steps=useMemo(()=>expandSession(todayWorkout?todayWorkout.items:[]),[todayWorkout]);
  if(data)applyTheme(data.theme||"aube",data.accent||null);
  if(!authReady)return <div className="min-h-screen flex items-center justify-center" style={{background:C.night,color:C.dim}}>Chargement…</div>;
  if(!fbReady)return <div className="min-h-screen flex items-center justify-center text-center px-8" style={{background:C.night,color:C.ember}}>Firebase non configuré.</div>;
  if(!user)return <Login/>;
  if(!data)return <div className="min-h-screen flex items-center justify-center" style={{background:C.night,color:C.dim}}>Synchronisation…</div>;
  return (
    <div style={{background:C.night,color:C.text,minHeight:"100vh",fontFamily:"system-ui,-apple-system,sans-serif",paddingTop:"env(safe-area-inset-top)"}}>
      {!online&&(
        <div className="fixed z-40 px-3 py-1.5 rounded-full text-[11px] font-semibold flex items-center gap-1.5" style={{left:"50%",top:"calc(env(safe-area-inset-top) + 10px)",transform:"translateX(-50%)",...glassStyle({border:`1px solid ${hexA(C.gold,0.4)}`,color:C.gold})}}>
          <span className="w-2 h-2 rounded-full" style={{background:C.gold}}/>
          {pendingWrites?"Hors ligne · sync en attente":"Hors ligne"}
        </div>
      )}
      {tab==="seance"&&<div key="seance" className="tab-enter"><SeanceTab data={data} markSport={markSport} openRunner={(idx)=>setRunner({idx})} openWod={(w)=>setWod(w)} openSettings={()=>setSettings(true)}/></div>}
      {tab==="nutrition"&&<div key="nutrition" className="tab-enter"><NutritionTab data={data} update={update} today={today} openSettings={()=>setSettings(true)}/></div>}
      {tab==="suivi"&&<div key="suivi" className="tab-enter"><SuiviTab data={data} update={update} today={today} openSettings={()=>setSettings(true)}/></div>}
      {runner&&<Runner steps={steps} startIdx={runner.idx} onProgress={(idx)=>update({progress:{idx}})} onClose={()=>setRunner(null)} onDone={()=>{update({progress:null});markSport();setRunner(null);}} data={data}/>}
      {wod&&<WodRunner wod={wod} onClose={()=>setWod(null)} onDone={()=>{markSport();setWod(null);}}/>}
      {settings&&<Settings data={data} update={update} onClose={()=>setSettings(false)} onLogout={()=>{auth.signOut();setSettings(false);}}/>}
      <div className="fixed bottom-0 left-0 right-0 flex" style={{background:hexA(C.night,data.navAlpha==null?0.92:data.navAlpha),backdropFilter:`blur(${(data.navAlpha==null?0.92:data.navAlpha)<1?20:0}px)`,WebkitBackdropFilter:`blur(${(data.navAlpha==null?0.92:data.navAlpha)<1?20:0}px)`,borderTop:`1px solid ${(data.navAlpha==null?0.92:data.navAlpha)<1?hexA("#FFFFFF",0.08):C.line}`,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {[["seance","Séance","dumbbell"],["nutrition","Nutrition","apple"],["suivi","Suivi","calendar"]].map(([k,l,ic])=>(<button key={k} onClick={()=>setTab(k)} className="flex-1 flex flex-col items-center gap-1 py-3" style={{color:tab===k?C.ember:C.dim}}><Icon name={ic} size={22}/><span className="text-[11px] font-medium">{l}</span></button>))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
